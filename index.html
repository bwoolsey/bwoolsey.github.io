<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blake Woolsey</title>
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">

  <style>
        .image-container {
      position: relative;
      width: 100%;
      height: 80vh;
      background-image: url('foggy_forest.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border-radius: 8px;
      overflow: hidden;
      padding: 0 2rem;
    }

    h1 {
      font-size: 3.6rem;
      font-weight: 600;
      margin-bottom: 1.1rem;
      color: #ededed;
      letter-spacing: -0.5px;
      line-height: 1.1;
      text-shadow: 0 2px 5px rgba(0, 0, 0, 0.35);
      transition: all 0.3s ease;
    }

    p {
      font-size: 1.6rem;
      font-weight: 400;
      color: #f4f4f4;
      line-height: 1.4;
      text-shadow: 0 1.5px 4px rgba(0, 0, 0, 0.35);
      max-width: 800px;
      transition: all 0.3s ease;
    }
  </style>
</head>

<body>
  <header>
    BLAKE WOOLSEY
  </header>

  <div id="navbar-placeholder"></div>

  <main>
    <div class="image-container">
      <h1>Being here.</h1>
      <p>Because I can. Because it's mine.</p>
    </div>
  </main>

  <footer>
    &copy; 2025 BLAKE WOOLSEY – ALL RIGHTS RESERVED
  </footer>
  <script src="navbar.js"></script>
</body>
</html>
